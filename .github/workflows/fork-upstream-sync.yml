name: Fork upstream sync

on:
  schedule:
    # Weekly keeps conflicts bounded without turning upstream drift checks into daily CI spend.
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: fork-upstream-sync-main
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: openclaw/openclaw
  SYNC_BRANCH: sync/upstream-main
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    if: github.repository == 'fakoli/openclaw'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout fork main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.FORK_SYNC_TOKEN != '' && secrets.FORK_SYNC_TOKEN || github.token }}
          persist-credentials: true

      - name: Prepare upstream merge branch
        id: sync
        env:
          HAS_FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN != '' && 'true' || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags origin main
          git fetch --no-tags upstream main

          fork_sha="$(git rev-parse origin/main)"
          upstream_sha="$(git rev-parse upstream/main)"
          {
            echo "fork_sha=${fork_sha}"
            echo "upstream_sha=${upstream_sha}"
          } >> "${GITHUB_OUTPUT}"

          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "status=up_to_date" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git switch -C "${SYNC_BRANCH}" origin/main
          set +e
          git merge --no-edit upstream/main
          merge_status="$?"
          set -e

          if [ "${merge_status}" -ne 0 ]; then
            git diff --name-only --diff-filter=U > "${RUNNER_TEMP}/upstream-sync-conflicts.txt"
            {
              echo "status=conflict"
              echo "conflict_files<<EOF"
              cat "${RUNNER_TEMP}/upstream-sync-conflicts.txt"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="${RUNNER_TEMP}/upstream-sync-files.txt"
          workflow_files="${RUNNER_TEMP}/upstream-sync-workflow-files.txt"
          lockfile_files="${RUNNER_TEMP}/upstream-sync-lockfiles.txt"
          generated_doc_files="${RUNNER_TEMP}/upstream-sync-generated-docs.txt"

          git diff --name-only origin/main..HEAD > "${changed_files}"
          grep -E '^\.github/workflows/' "${changed_files}" > "${workflow_files}" || true
          grep -E '(^|/)(pnpm-lock\.yaml|package-lock\.json|npm-shrinkwrap\.json|bun\.lockb?)$' "${changed_files}" > "${lockfile_files}" || true
          grep -E '^docs/(docs_map\.md|plugins/reference\.md|plugins/reference/|plugins/plugin-inventory\.md)' "${changed_files}" > "${generated_doc_files}" || true

          changed_count="$(wc -l < "${changed_files}" | tr -d '[:space:]')"
          workflow_changed="false"
          lockfile_changed="false"
          generated_docs_changed="false"
          [ -s "${workflow_files}" ] && workflow_changed="true"
          [ -s "${lockfile_files}" ] && lockfile_changed="true"
          [ -s "${generated_doc_files}" ] && generated_docs_changed="true"

          sync_sha="$(git rev-parse HEAD)"
          sync_status="merged"
          if [ "${workflow_changed}" = "true" ] && [ "${HAS_FORK_SYNC_TOKEN}" != "true" ]; then
            sync_status="missing_workflow_token"
          fi

          {
            echo "status=${sync_status}"
            echo "sync_sha=${sync_sha}"
            echo "changed_count=${changed_count}"
            echo "workflow_changed=${workflow_changed}"
            echo "lockfile_changed=${lockfile_changed}"
            echo "generated_docs_changed=${generated_docs_changed}"
            echo "workflow_files<<EOF"
            cat "${workflow_files}"
            echo "EOF"
            echo "lockfile_files<<EOF"
            cat "${lockfile_files}"
            echo "EOF"
            echo "generated_doc_files<<EOF"
            cat "${generated_doc_files}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          if [ "${sync_status}" = "missing_workflow_token" ]; then
            exit 0
          fi

          git push --force-with-lease origin "HEAD:${SYNC_BRANCH}"

      - name: Open or update upstream sync PR
        if: steps.sync.outputs.status == 'merged'
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN != '' && secrets.FORK_SYNC_TOKEN || github.token }}
          FORK_SHA: ${{ steps.sync.outputs.fork_sha }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
          SYNC_SHA: ${{ steps.sync.outputs.sync_sha }}
          CHANGED_COUNT: ${{ steps.sync.outputs.changed_count }}
          WORKFLOW_CHANGED: ${{ steps.sync.outputs.workflow_changed }}
          LOCKFILE_CHANGED: ${{ steps.sync.outputs.lockfile_changed }}
          GENERATED_DOCS_CHANGED: ${{ steps.sync.outputs.generated_docs_changed }}
          WORKFLOW_FILES: ${{ steps.sync.outputs.workflow_files }}
          LOCKFILE_FILES: ${{ steps.sync.outputs.lockfile_files }}
          GENERATED_DOC_FILES: ${{ steps.sync.outputs.generated_doc_files }}
        shell: bash
        run: |
          set -euo pipefail

          body_file="${RUNNER_TEMP}/upstream-sync-pr.md"
          cat > "${body_file}" <<EOF
          What Problem This Solves

          Keeps fakoli/openclaw current with public upstream openclaw/openclaw without force-pushing fork main.

          Why This Change Was Made

          This automated maintenance PR merges upstream main into the fork's main branch on a reusable sync branch.

          User Impact

          The fork receives upstream capabilities sooner, and conflicts stay small because sync happens on a regular cadence. This PR is intentionally human-gated and will not be auto-merged by the workflow.

          Evidence

          - Fork main before sync: ${FORK_SHA}
          - Upstream main: ${UPSTREAM_SHA}
          - Sync branch head: ${SYNC_SHA}
          - Changed files: ${CHANGED_COUNT}
          - Workflow files changed: ${WORKFLOW_CHANGED}
          - Lockfiles changed: ${LOCKFILE_CHANGED}
          - Generated docs changed: ${GENERATED_DOCS_CHANGED}
          - Automation pushed only ${SYNC_BRANCH}; it did not write directly to main.

          Review Notes

          - Merge this sync PR before feature branches when possible.
          - Review workflow changes manually before merge.
          - If CI cost is a concern, prioritize changed-path, workflow sanity, dependency/security guards, and docs/generated checks before running broader suites.
          EOF

          append_optional_block() {
            local heading="$1"
            local content="$2"
            if [ -n "${content}" ]; then
              {
                echo
                echo "${heading}"
                echo
                echo '```'
                printf '%s\n' "${content}"
                echo '```'
              } >> "${body_file}"
            fi
          }

          append_optional_block "Workflow Files" "${WORKFLOW_FILES}"
          append_optional_block "Lockfiles" "${LOCKFILE_FILES}"
          append_optional_block "Generated Docs" "${GENERATED_DOC_FILES}"

          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${SYNC_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "chore: sync fork with upstream main" \
              --body-file "${body_file}"
          else
            pr_url="$(gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${SYNC_BRANCH}" \
              --title "chore: sync fork with upstream main" \
              --body-file "${body_file}")"
            pr_number="${pr_url##*/}"
          fi

          echo "Sync PR: ${pr_number}"
          echo "::notice::Leaving upstream sync PR open for manual review and merge."

      - name: Report missing workflow token
        if: steps.sync.outputs.status == 'missing_workflow_token'
        env:
          GH_TOKEN: ${{ github.token }}
          FORK_SHA: ${{ steps.sync.outputs.fork_sha }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
          WORKFLOW_FILES: ${{ steps.sync.outputs.workflow_files }}
        shell: bash
        run: |
          set -euo pipefail

          title="Fork sync token needs workflow permission"
          body_file="${RUNNER_TEMP}/upstream-sync-token.md"
          cat > "${body_file}" <<EOF
          The scheduled fork sync merged upstream main locally, but upstream changed workflow files and the repository is missing `FORK_SYNC_TOKEN`.

          Fork main: ${FORK_SHA}
          Upstream main: ${UPSTREAM_SHA}

          Workflow files in the upstream sync:

          \`\`\`
          ${WORKFLOW_FILES}
          \`\`\`

          Add a fine-grained token secret named `FORK_SYNC_TOKEN` scoped only to `fakoli/openclaw` with contents, pull request, and workflow write permissions, then rerun the Fork upstream sync workflow. The workflow will still leave the sync PR open for human review.
          EOF

          issue_number="$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --search "${title} in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --repo "${GITHUB_REPOSITORY}" --body-file "${body_file}"
          else
            gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --body-file "${body_file}"
          fi

          exit 1

      - name: Report upstream sync conflict
        if: steps.sync.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ github.token }}
          FORK_SHA: ${{ steps.sync.outputs.fork_sha }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
          CONFLICT_FILES: ${{ steps.sync.outputs.conflict_files }}
        shell: bash
        run: |
          set -euo pipefail

          title="Upstream sync conflict"
          body_file="${RUNNER_TEMP}/upstream-sync-conflict.md"
          cat > "${body_file}" <<EOF
          The scheduled fork sync could not merge public upstream main into fakoli/openclaw main cleanly.

          Fork main: ${FORK_SHA}
          Upstream main: ${UPSTREAM_SHA}

          Conflicting files:

          \`\`\`
          ${CONFLICT_FILES}
          \`\`\`

          Resolve by creating a fork-only maintenance PR that merges upstream main into fakoli/openclaw main. Do not force-push main.
          EOF

          issue_number="$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --search "${title} in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --repo "${GITHUB_REPOSITORY}" --body-file "${body_file}"
          else
            gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --body-file "${body_file}"
          fi

          exit 1
